name: Release
on:
  push:
    branches:
      - main
    # Only cut a release when the application code or the Helm chart changes.
    # Docs, CI workflows and other repo files do not trigger a release.
    # workflow_dispatch below still allows forcing a manual release.
    paths:
      - '**/*.go'
      - '!**/*_test.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      bump:
        description: "Which version part to bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Mint a token from the release GitHub App so the chart-version commit
      # can bypass the "require pull request" branch ruleset on main. The App
      # is added to the ruleset bypass list (see repo settings -> rules).
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bump=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump="${{ github.event.inputs.bump }}"
          else
            # Read the labels from the PR associated with this merge commit.
            # An explicit semver label wins; a "dependencies" label (e.g. added
            # by Renovate) is treated as a patch release.
            labels="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '.[].labels[].name' 2>/dev/null || true)"
            explicit=""
            deps=""
            for label in ${labels}; do
              case "${label}" in
                major|minor|patch) explicit="${label}" ;;
                dependencies) deps="patch" ;;
              esac
            done
            bump="${explicit:-${deps}}"
          fi
          if [ -z "${bump}" ]; then
            echo "No semver label found; defaulting to patch"
            bump="patch"
          fi
          latest="$(git tag --sort=-v:refname | head -n1)"
          if [ -z "${latest}" ]; then
            latest="v0.0.0"
          fi
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "${version}"
          case "${bump}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "previous=${latest}" >> "${GITHUB_OUTPUT}"
          echo "next=${next}" >> "${GITHUB_OUTPUT}"
          echo "Releasing ${next} (previous ${latest}, bump ${bump})"

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: cbeneke
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            cbeneke/hcloud-fip-controller:latest
            cbeneke/hcloud-fip-controller:${{ steps.version.outputs.next }}

      - name: Bump chart version
        run: |
          set -euo pipefail
          next="${{ steps.version.outputs.next }}"
          # Helm chart versions are SemVer without a leading "v". The chart
          # version and appVersion are kept in lockstep.
          chart_version="${next#v}"
          sed -i -E "s|^version:.*|version: ${chart_version}|" deploy/Chart.yaml
          sed -i -E "s|^appVersion:.*|appVersion: \"${chart_version}\"|" deploy/Chart.yaml

      - name: Package and push Helm chart (OCI)
        run: |
          set -euo pipefail
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username cbeneke --password-stdin
          helm package deploy --destination dist
          helm push dist/hcloud-fip-controller-*.tgz "oci://registry-1.docker.io/cbeneke"

      - name: Commit chart version
        run: |
          set -euo pipefail
          next="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- deploy/Chart.yaml; then
            echo "No chart changes to commit"
          else
            git add deploy/Chart.yaml
            git commit -m "chore(release): ${next} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          next="${{ steps.version.outputs.next }}"
          git tag "${next}"
          git push origin "${next}"
          gh release create "${next}" \
            --title "${next}" \
            --generate-notes \
            dist/hcloud-fip-controller-*.tgz
